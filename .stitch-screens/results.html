<script>
        function createConfetti() {
            const container = document.getElementById('confetti-root');
            const colors = ['#0051d5', '#276afa', '#fe893c', '#9a4600', '#ffffff'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                const size = Math.random() * 8 + 4 + 'px';
                confetti.style.width = size;
                confetti.style.height = size;
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.opacity = Math.random();
                
                const duration = Math.random() * 3 + 2 + 's';
                const delay = Math.random() * 5 + 's';
                confetti.style.animationDuration = duration;
                confetti.style.animationDelay = delay;
                
                container.appendChild(confetti);
                
                confetti.addEventListener('animationiteration', () => {
                    confetti.style.left = Math.random() * 100 + 'vw';
                });
            }
        }

        document.addEventListener('DOMContentLoaded', createConfetti);

        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('mousedown', () => {
                el.style.transform = 'scale(0.95)';
                el.style.transition = 'transform 0.1s ease-out';
            });
            el.addEventListener('mouseup', () => {
                el.style.transform = '';
            });
            el.addEventListener('mouseleave', () => {
                el.style.transform = '';
            });
        });
    </script>
